<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hIconGradBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.15)"/>
    </linearGradient>
  </defs>

  <!-- Brand blue background -->
  <rect width="400" height="100" rx="14" fill="#1A56DB"/>

  <!-- Icon: back card -->
  <rect x="14" y="19" width="53" height="39" rx="7"
    fill="rgba(255,255,255,0.1)"
    stroke="rgba(255,255,255,0.2)" stroke-width="1.5"
    transform="rotate(-6 41 41)"/>

  <!-- Icon: main card (glass effect on brand bg) -->
  <rect x="17" y="22" width="55" height="39" rx="8" fill="url(#hIconGradBrand)"
    stroke="rgba(255,255,255,0.35)" stroke-width="1"/>

  <!-- Icon: play triangle -->
  <polygon points="33,33 54,44 33,55" fill="#ffffff" opacity="0.95"/>

  <!-- Icon: text lines -->
  <rect x="23" y="53" width="22" height="3" rx="2" fill="#ffffff" opacity="0.4"/>
  <rect x="23" y="58" width="15" height="3" rx="2" fill="#ffffff" opacity="0.25"/>

  <!-- Icon: green badge -->
  <circle cx="64" cy="26" r="10" fill="#10B981"/>
  <polyline points="59,26 63,31 70,20"
    stroke="#ffffff" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark: Anki -->
  <text x="88" y="52"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="34" font-weight="700"
    fill="#ffffff">Anki</text>

  <!-- Wordmark: Tube -->
  <text x="183" y="52"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="34" font-weight="400"
    fill="rgba(255,255,255,0.7)">Tube</text>

  <!-- Wordmark: LEARN -->
  <text x="90" y="74"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="17" font-weight="400"
    fill="#10B981" letter-spacing="4">LEARN</text>
</svg>
